name: ios-signing-bootstrap

# UNA TANTUM — crea il certificato di distribuzione App Store + il provisioning profile e li
# salva (cifrati) nello storage match, così il job release-ios li riusa SEMPRE senza creare
# nuovi certificati (era il churn a riempire la quota Apple → «maximum number of certificates»,
# che faceva fallire la firma con «No profiles for 'it.cercaposta.app' were found»).
#
# PRIMA di lanciarlo:
#  1) libera uno slot certificato: developer.apple.com → Certificates → revoca i vecchi
#     certificati «Apple Distribution» inutilizzati (match ne creera' UNO canonico);
#  2) prepara lo storage: un repo git PRIVATO vuoto (GitHub privato o il vostro OneDev);
#  3) imposta i secret del repo (Settings → Secrets → Actions): MATCH_PASSWORD (passphrase a
#     scelta), MATCH_GIT_URL (URL del repo di storage), MATCH_GIT_BASIC_AUTHORIZATION
#     (base64 di "utente:token" con accesso allo storage). Gli ASC_* / APPLE_TEAM_ID esistono gia'.
#
# Poi: Actions → ios-signing-bootstrap → Run workflow. Da eseguire una volta sola (e di nuovo solo
# se il certificato scade o si vuole rigenerare).
on:
  workflow_dispatch:

jobs:
  bootstrap:
    # macos-26 (Xcode 26): Apple rifiuta materiale di firma piu' vecchio dell'SDK iOS 26.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios
      - name: Installa la ASC API key per fastlane
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_P8_BASE64" | openssl base64 -d -A > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
      - name: fastlane certificates (crea + salva certificato/profilo in match)
        working-directory: ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane certificates
