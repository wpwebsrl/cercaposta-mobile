name: mobile

# CI dell'app Flutter (repo pubblico → minuti Actions GRATUITI e illimitati sui
# runner GitHub-hosted, macOS compreso). Su push/PR girano la CI Android su
# Linux (analyze + test) E la verifica di compilazione iOS (unsigned) su macOS.
# I release (firmati) partono SOLO a mano — vedi workflow_dispatch.
on:
  push:
    branches: [main]
  pull_request:
  # Rilascio manuale (Actions -> mobile -> Run workflow): scegli la piattaforma.
  #   android = solo AAB firmato (artefatto da scaricare, nessuna pubblicazione)
  #   ios     = firma + upload su TestFlight
  #   both    = entrambi
  workflow_dispatch:
    inputs:
      platform:
        description: 'Piattaforma da rilasciare'
        type: choice
        options: [android, ios, both]
        default: android

env:
  FLUTTER_VERSION: '3.32.3'

jobs:
  analyze-test-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      # Fuori dal monorepo lo script non trova backend/app/core/compat.py e salta
      # con un messaggio: il floor del server va verificato a mano prima di ogni
      # release (il registro vive nel repo privato del server).
      - run: python3 tool/check_version_floor.py
      - run: flutter test
      # Inject the build identity (short SHA + commit date), mirroring the web's
      # Vite __APP_BUILD__/__APP_BUILD_DATE__ — surfaced on the About page.
      - run: >
          flutter build apk --debug
          --dart-define=APP_BUILD=$(git rev-parse --short HEAD)
          --dart-define=APP_BUILD_DATE=$(git log -1 --format=%cs)

  # Verifica di compilazione iOS (senza firma) ad ogni push/PR: nel repo
  # pubblico i runner macOS sono gratuiti, quindi la si può tenere sempre
  # accesa (nel monorepo privato era spenta: costava 10× i minuti).
  build-ios-check:
    if: github.event_name != 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: >
          flutter build ios --release --no-codesign
          --dart-define=APP_BUILD=$(git rev-parse --short HEAD)
          --dart-define=APP_BUILD_DATE=$(git log -1 --format=%cs)

  # Firma la build e la carica su TestFlight. Solo su lancio manuale con
  # platform ios/both: richiede i secret Apple, quindi non gira su push/PR
  # (e le PR da fork non ricevono comunque i secrets — default GitHub).
  release-ios:
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'both')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios
      - run: flutter pub get
      # Numero di build monotòno crescente (richiesto da TestFlight): run number
      # della CI +100. L'offset garantisce la continuità col monorepo privato,
      # la cui CI era arrivata ~build 20: qui il contatore riparte da 1, e un
      # numero <= a uno già caricato verrebbe rifiutato da Apple/Google.
      # (Le espressioni Actions non fanno aritmetica: si calcola in shell.)
      - name: Build number
        id: bn
        run: echo "num=$(( ${{ github.run_number }} + 100 ))" >> "$GITHUB_OUTPUT"
      # Scrive FLUTTER_BUILD_NUMBER in Generated.xcconfig, che l'archivio Xcode
      # successivo riusa.
      - run: >
          flutter build ios --release --no-codesign
          --build-number=${{ steps.bn.outputs.num }}
          --dart-define=APP_BUILD=$(git rev-parse --short HEAD)
          --dart-define=APP_BUILD_DATE=$(git log -1 --format=%cs)
      # Rende la ASC API key rintracciabile da xcodebuild per la firma
      # automatica (-allowProvisioningUpdates): il percorso ~/.appstoreconnect/
      # private_keys/AuthKey_<KEY_ID>.p8 è cercato automaticamente da Xcode.
      - name: Installa la ASC API key per xcodebuild
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_P8_BASE64" | openssl base64 -d -A > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
      - name: Fastlane beta (firma + upload TestFlight)
        working-directory: ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: bundle exec fastlane beta

  # Build dell'App Bundle Android firmato (release), offuscato. Solo su lancio
  # manuale: richiede i secret di firma, quindi non gira su push/PR.
  # Secret richiesti (GitHub → Settings → Secrets):
  #   ANDROID_KEYSTORE_BASE64  — la upload keystore .jks in base64
  #     (PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes("upload-keystore.jks")))
  #   ANDROID_KEY_PROPERTIES   — il contenuto di key.properties, es.:
  #     storeFile=upload-keystore.jks
  #     storePassword=…
  #     keyAlias=upload
  #     keyPassword=…
  release-android:
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'both')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Scrivi la configurazione di firma dai secret
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          printf '%s' "$ANDROID_KEY_PROPERTIES" > android/key.properties
      # versionCode = run number +100 (v. release-ios: continuità col monorepo);
      # Google Play rifiuta un upload con versionCode <= a uno già caricato.
      # --obfuscate + --split-debug-info: offuscamento del codice Dart in release
      # (hardening §10 del brief); i simboli servono a de-offuscare i crash.
      - name: Build number
        id: bn
        run: echo "num=$(( ${{ github.run_number }} + 100 ))" >> "$GITHUB_OUTPUT"
      - run: >
          flutter build appbundle --release
          --build-number=${{ steps.bn.outputs.num }}
          --obfuscate --split-debug-info=build/symbols
          --dart-define=APP_BUILD=$(git rev-parse --short HEAD)
          --dart-define=APP_BUILD_DATE=$(git log -1 --format=%cs)
      - uses: actions/upload-artifact@v7
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
      # Simboli di offuscamento: conservali per de-offuscare gli stack trace dei
      # crash di QUESTA build (nome = versionCode caricato, quindi identificabile).
      - uses: actions/upload-artifact@v7
        with:
          name: android-symbols-${{ steps.bn.outputs.num }}
          path: build/symbols
          if-no-files-found: warn
